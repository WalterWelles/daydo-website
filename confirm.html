<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DayDo</title>
  <style>
    body { font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #0a0514; color: #fff; text-align: center; }
    .wrap { padding: 24px; }
    h1 { font-size: 28px; margin-bottom: 8px; }
    p { color: #aaa; font-size: 14px; margin-bottom: 24px; }
    a { display: inline-block; background: #6366F1; color: #fff; padding: 14px 32px; border-radius: 14px; text-decoration: none; font-weight: 700; font-size: 16px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Redirection vers DayDo...</h1>
    <p>Si l'app ne s'ouvre pas automatiquement :</p>
    <a id="open" href="#">Ouvrir DayDo</a>
  </div>
  <script>
    var hash = window.location.hash;
    var deeplink = 'daydo://' + hash;
    document.getElementById('open').href = deeplink;
    window.location.href = deeplink;
  </script>
</body>
</html>
