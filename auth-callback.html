<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DayDo — Redirection...</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d0d1a; color: #fff;
      min-height: 100vh; display: flex;
      align-items: center; justify-content: center;
    }
    .loading { text-align: center; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #1a1a2e; border-top-color: #6366F1;
      border-radius: 50%; animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { color: #A0A0B8; font-size: 14px; }
  </style>
</head>
<body>
  <div class="loading">
    <div class="spinner"></div>
    <p>Redirection...</p>
  </div>
  <script>
    (function() {
      var hash = window.location.hash || '';
      var search = window.location.search || '';
      var fullParams = hash + '&' + search;

      // Recovery = reset password
      if (fullParams.includes('type=recovery')) {
        window.location.replace('/reset.html' + hash);
        return;
      }

      // Signup confirmation or email change
      if (fullParams.includes('type=signup') || fullParams.includes('type=email_change') || fullParams.includes('access_token')) {
        window.location.replace('/confirm.html' + hash);
        return;
      }

      // Error (expired link etc)
      if (fullParams.includes('error=')) {
        window.location.replace('/confirm.html' + hash);
        return;
      }

      // Default: show confirm page
      window.location.replace('/confirm.html');
    })();
  </script>
</body>
</html>
