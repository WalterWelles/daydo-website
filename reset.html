<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DayDo — Nouveau mot de passe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d0d1a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .card {
      max-width: 420px;
      width: 90%;
      text-align: center;
      padding: 40px 28px;
    }
    .logo { width: 80px; border-radius: 16px; margin-bottom: 24px; }
    .emoji { font-size: 48px; margin-bottom: 16px; }
    .title { font-size: 22px; font-weight: 900; margin-bottom: 8px; }
    .subtitle { font-size: 14px; color: #A0A0B8; line-height: 22px; margin-bottom: 28px; }
    .input {
      width: 100%;
      background: #1a1a2e;
      border: 1px solid #ffffff15;
      border-radius: 14px;
      padding: 16px;
      font-size: 16px;
      color: #fff;
      outline: none;
      margin-bottom: 12px;
      text-align: center;
    }
    .input:focus { border-color: #6366F1; }
    .input::placeholder { color: #A0A0B860; }
    .btn {
      width: 100%;
      background: #6366F1;
      color: #fff;
      border: none;
      border-radius: 14px;
      padding: 16px;
      font-size: 17px;
      font-weight: 800;
      cursor: pointer;
      margin-top: 8px;
      transition: transform 0.15s, opacity 0.15s;
    }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .error { color: #EF4444; font-size: 13px; margin-top: 12px; }
    .success-card { display: none; }
    .success-emoji { font-size: 56px; margin-bottom: 16px; }
    .success-title { font-size: 22px; font-weight: 900; margin-bottom: 8px; color: #22C55E; }
    .success-sub { font-size: 14px; color: #A0A0B8; line-height: 22px; margin-bottom: 28px; }
    .link-btn {
      display: inline-block;
      background: #6366F1;
      color: #fff;
      text-decoration: none;
      font-size: 16px;
      font-weight: 700;
      padding: 14px 40px;
      border-radius: 14px;
    }
    .footer { margin-top: 40px; font-size: 12px; color: #A0A0B840; }
    .footer a { color: #6366F180; text-decoration: none; }
    .loading { display: none; }
    .spinner {
      width: 24px; height: 24px;
      border: 3px solid #ffffff30;
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card" id="form-card">
    <img src="https://daydo.app/logo.png" alt="DayDo" class="logo" />
    <div class="emoji">🔐</div>
    <div class="title">Nouveau mot de passe</div>
    <div class="subtitle">Choisis un nouveau mot de passe pour ton compte DayDo.</div>
    <input type="password" id="password" class="input" placeholder="Nouveau mot de passe" minlength="8" />
    <input type="password" id="password-confirm" class="input" placeholder="Confirmer le mot de passe" minlength="8" />
    <button class="btn" id="submit-btn" onclick="resetPassword()">
      <span id="btn-text">Changer mon mot de passe</span>
      <span id="btn-loading" class="loading"><span class="spinner"></span></span>
    </button>
    <div class="error" id="error"></div>
  </div>

  <div class="card success-card" id="success-card">
    <img src="https://daydo.app/logo.png" alt="DayDo" class="logo" />
    <div class="success-emoji">✅</div>
    <div class="success-title">Mot de passe modifié !</div>
    <div class="success-sub">Tu peux maintenant te connecter avec ton nouveau mot de passe dans l'app DayDo.</div>
    <a href="https://daydo.app" class="link-btn">Ouvrir DayDo 🚀</a>
  </div>

  <div class="footer">
    <a href="https://daydo.app">daydo.app</a>
  </div>

  <script>
    const SUPABASE_URL = 'https://rrxxaesttwzrjyqciyhv.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJyeHhhZXN0dHd6cmp5cWNpeWh2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwOTk5ODcsImV4cCI6MjA4ODY3NTk4N30.j-wKQzR7gIS7-FWdIKwU6sYYJ0FdDFO4pqwp5GIgYcM';

    // Extraire le access_token du hash
    function getTokenFromHash() {
      const hash = window.location.hash.substring(1);
      const params = new URLSearchParams(hash);
      return params.get('access_token');
    }

    async function resetPassword() {
      const pw = document.getElementById('password').value;
      const pw2 = document.getElementById('password-confirm').value;
      const errorEl = document.getElementById('error');
      const btn = document.getElementById('submit-btn');
      const btnText = document.getElementById('btn-text');
      const btnLoading = document.getElementById('btn-loading');

      errorEl.textContent = '';

      if (!pw || pw.length < 8) {
        errorEl.textContent = 'Le mot de passe doit faire au moins 8 caractères.';
        return;
      }
      if (pw !== pw2) {
        errorEl.textContent = 'Les mots de passe ne correspondent pas.';
        return;
      }

      const token = getTokenFromHash();
      if (!token) {
        errorEl.textContent = 'Lien invalide ou expiré. Redemande un email de réinitialisation.';
        return;
      }

      btn.disabled = true;
      btnText.style.display = 'none';
      btnLoading.style.display = 'inline';

      try {
        const res = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': 'Bearer ' + token,
          },
          body: JSON.stringify({ password: pw }),
        });

        if (res.ok) {
          document.getElementById('form-card').style.display = 'none';
          document.getElementById('success-card').style.display = 'block';
        } else {
          const data = await res.json();
          errorEl.textContent = data.msg || data.message || 'Erreur lors du changement. Réessaie.';
          btn.disabled = false;
          btnText.style.display = 'inline';
          btnLoading.style.display = 'none';
        }
      } catch (e) {
        errorEl.textContent = 'Erreur réseau. Vérifie ta connexion.';
        btn.disabled = false;
        btnText.style.display = 'inline';
        btnLoading.style.display = 'none';
      }
    }

    // Vérifier qu'on a un token
    window.addEventListener('load', function() {
      const token = getTokenFromHash();
      if (!token) {
        document.getElementById('error').textContent = 'Lien invalide ou expiré. Redemande un email de réinitialisation depuis l\'app.';
        document.getElementById('submit-btn').disabled = true;
      }
    });
  </script>
</body>
</html>
