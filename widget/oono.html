<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>DayDo Widget Compact - Stream Oono</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    width: 100%;
    height: 100%;
    background: transparent;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
  }

  /* ============================================
     CONTENEUR PRINCIPAL
     ============================================ */
  .widget-container {
    position: relative;
    width: 360px;
    height: 200px;
    margin: 20px;
  }

  /* ============================================
     BORDURE NÉON ROTATIVE (faisceau lumineux)
     Effet conique qui simule un point lumineux
     qui parcourt le tour du widget
     ============================================ */
  .neon-border {
    position: absolute;
    inset: -2px;
    border-radius: 20px;
    overflow: hidden;
    z-index: 1;
  }

  .neon-border::before {
    content: '';
    position: absolute;
    inset: 0;
    background: conic-gradient(
      from 0deg,
      transparent 0deg,
      transparent 280deg,
      #EC4899 320deg,
      #F59E0B 340deg,
      #ffffff 360deg,
      transparent 360deg
    );
    animation: rotate-neon 3s linear infinite;
  }

  .neon-border::after {
    content: '';
    position: absolute;
    inset: 0;
    background: conic-gradient(
      from 180deg,
      transparent 0deg,
      transparent 280deg,
      #6366F1 320deg,
      #818CF8 340deg,
      #ffffff 360deg,
      transparent 360deg
    );
    animation: rotate-neon 3s linear infinite;
  }

  @keyframes rotate-neon {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  /* ============================================
     SECONDE COUCHE NÉON (plus large pour le glow)
     ============================================ */
  .neon-glow {
    position: absolute;
    inset: -8px;
    border-radius: 24px;
    overflow: hidden;
    z-index: 0;
    filter: blur(8px);
    opacity: 0.7;
  }

  .neon-glow::before {
    content: '';
    position: absolute;
    inset: 0;
    background: conic-gradient(
      from 0deg,
      transparent 0deg,
      transparent 280deg,
      #EC4899 320deg,
      #F59E0B 340deg,
      #ffffff 360deg,
      transparent 360deg
    );
    animation: rotate-neon 3s linear infinite;
  }

  .neon-glow::after {
    content: '';
    position: absolute;
    inset: 0;
    background: conic-gradient(
      from 180deg,
      transparent 0deg,
      transparent 280deg,
      #6366F1 320deg,
      #818CF8 340deg,
      #ffffff 360deg,
      transparent 360deg
    );
    animation: rotate-neon 3s linear infinite;
  }

  /* ============================================
     CARTE INTERIEURE (couvre le centre)
     ============================================ */
  .widget-card {
    position: absolute;
    inset: 0;
    background: #2D1B69;
    border-radius: 18px;
    overflow: hidden;
    z-index: 2;
  }

  /* ============================================
     GRILLE CYBERPUNK
     ============================================ */
  .cyber-grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(99, 102, 241, 0.12) 1px, transparent 1px),
      linear-gradient(90deg, rgba(99, 102, 241, 0.12) 1px, transparent 1px);
    background-size: 24px 24px;
    background-position: center center;
    animation: grid-move 20s linear infinite;
    opacity: 0.5;
  }

  @keyframes grid-move {
    0% { background-position: 0 0; }
    100% { background-position: 24px 24px; }
  }

  /* ============================================
     ORBES INTÉRIEURS
     ============================================ */
  .glow-orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(30px);
    pointer-events: none;
  }

  .glow-1 {
    width: 140px;
    height: 140px;
    background: rgba(236, 72, 153, 0.35);
    top: -40px;
    right: -30px;
    animation: float-1 8s ease-in-out infinite;
  }

  .glow-2 {
    width: 120px;
    height: 120px;
    background: rgba(245, 158, 11, 0.25);
    bottom: -30px;
    left: -30px;
    animation: float-2 10s ease-in-out infinite;
  }

  @keyframes float-1 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(-15px, 15px) scale(1.1); }
  }

  @keyframes float-2 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(15px, -15px) scale(1.15); }
  }

  /* ============================================
     CONTENU
     ============================================ */
  .content {
    position: relative;
    z-index: 10;
    width: 100%;
    height: 100%;
    padding: 18px 22px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .logo-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo {
    font-family: -apple-system, 'Inter', sans-serif;
    font-weight: 900;
    font-size: 38px;
    letter-spacing: -1.5px;
    color: white;
    line-height: 1;
    text-shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
  }

  .star {
    font-size: 24px;
    color: #EC4899;
    text-shadow:
      0 0 12px rgba(236, 72, 153, 0.8),
      0 0 24px rgba(236, 72, 153, 0.4);
    animation: star-pulse 2s ease-in-out infinite;
  }

  @keyframes star-pulse {
    0%, 100% { transform: scale(1) rotate(0deg); opacity: 1; }
    50% { transform: scale(1.15) rotate(180deg); opacity: 0.85; }
  }

  .challenge-label {
    font-size: 9px;
    font-weight: 700;
    color: #F59E0B;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-shadow: 0 0 8px rgba(245, 158, 11, 0.5);
  }

  .challenge-text {
    font-size: 16px;
    font-weight: 700;
    color: white;
    letter-spacing: -0.3px;
    margin-top: 3px;
    text-shadow: 0 1px 6px rgba(0, 0, 0, 0.4);
    line-height: 1.2;
  }

  .promo-block {
    background: linear-gradient(135deg, rgba(236, 72, 153, 0.15) 0%, rgba(245, 158, 11, 0.15) 100%);
    border: 1px solid rgba(245, 158, 11, 0.4);
    border-radius: 8px;
    padding: 9px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .promo-code-box {
    background: #EC4899;
    color: white;
    font-weight: 900;
    font-size: 14px;
    padding: 5px 11px;
    border-radius: 6px;
    letter-spacing: 1.5px;
    box-shadow: 0 0 12px rgba(236, 72, 153, 0.5);
    flex-shrink: 0;
  }

  .promo-text {
    color: white;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.2px;
    line-height: 1.3;
  }

  .promo-text .highlight {
    color: #F59E0B;
    font-weight: 800;
  }

  /* ============================================
     COINS NÉO-RÉTRO
     ============================================ */
  .corner {
    position: absolute;
    width: 14px;
    height: 14px;
    border: 2px solid #F59E0B;
    z-index: 15;
    opacity: 0.7;
  }

  .corner-tl { top: 8px; left: 8px; border-right: none; border-bottom: none; }
  .corner-tr { top: 8px; right: 8px; border-left: none; border-bottom: none; }
  .corner-bl { bottom: 8px; left: 8px; border-right: none; border-top: none; }
  .corner-br { bottom: 8px; right: 8px; border-left: none; border-top: none; }

  /* ============================================
     SCANLINES
     ============================================ */
  .scanlines {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      transparent 50%,
      rgba(0, 0, 0, 0.05) 50%
    );
    background-size: 100% 3px;
    pointer-events: none;
    z-index: 20;
    opacity: 0.25;
  }

</style>
</head>
<body>

<div class="widget-container">

  <!-- COUCHE GLOW EXTÉRIEUR (le halo flou autour) -->
  <div class="neon-glow"></div>

  <!-- BORDURE NÉON (le faisceau précis) -->
  <div class="neon-border"></div>

  <!-- CARTE INTÉRIEURE -->
  <div class="widget-card">

    <!-- GRILLE CYBERPUNK -->
    <div class="cyber-grid"></div>

    <!-- ORBES LUMINEUX INTÉRIEURS -->
    <div class="glow-orb glow-1"></div>
    <div class="glow-orb glow-2"></div>

    <!-- COINS NÉO-RÉTRO -->
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <!-- CONTENU -->
    <div class="content">

      <div class="logo-row">
        <div class="logo">DayDo</div>
        <div class="star">✦</div>
      </div>

      <div>
        <div class="challenge-label">⟪ Un défi créatif chaque jour ⟫</div>
        <div class="challenge-text">Photo · Vidéo · Audio</div>
      </div>

      <div class="promo-block">
        <div class="promo-code-box">OONO</div>
        <div class="promo-text">
          <span class="highlight">+20 points</span> &amp; <span class="highlight">1 joker</span> offerts
        </div>
      </div>

    </div>

    <!-- SCANLINES -->
    <div class="scanlines"></div>

  </div>
</div>

</body>
</html>
